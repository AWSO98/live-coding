version: '3.8'

services:
  api:
    build: ./backend
    container_name: forojejes-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=cambia_esto_por_un_secreto_seguro_en_produccion
    volumes:
      - sqlite_data:/app/data
      - ./forojejes.sql:/app/forojejes.sql:ro
    ports:
      - "3000:3000"

  frontend:
    image: nginx:alpine
    container_name: forojejes-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  sqlite_data:
